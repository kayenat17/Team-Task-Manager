[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate && npm run build"

[deploy]
startCommand = "npx prisma db push && npm run start"
restartPolicyType = "on_failure"
healthcheckPath = "/"
healthcheckTimeout = 30

[phases.setup]
nixPkgs = ["nodejs_20"]

[[volumes]]
mountPath = "/data"
